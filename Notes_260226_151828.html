<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Memories</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #fdf0f0;
            background: radial-gradient(circle, #fff5f5, #ffd1d1);
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        /* Polaroid Memory Style */
        .memory {
            position: absolute;
            width: 150px;
            padding: 10px 10px 30px 10px;
            background: white;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transform: rotate(-5deg);
            z-index: 1;
            transition: 0.3s;
        }
        
        .memory img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .memory:hover {
            transform: scale(1.1) rotate(0deg);
            z-index: 20;
        }

        /* Positioning the photos */
        .top-left { top: 5%; left: 5%; transform: rotate(-10deg); }
        .top-right { top: 5%; right: 5%; transform: rotate(8deg); }
        .bottom-left { bottom: 10%; left: 8%; transform: rotate(-15deg); }
        .bottom-right { bottom: 10%; right: 8%; transform: rotate(12deg); }

        /* Envelope Styles */
        .envelope-container {
            position: relative;
            width: 300px;
            height: 200px;
            cursor: pointer;
            perspective: 1000px;
            z-index: 10;
        }

        .envelope {
            position: relative;
            width: 100%; height: 100%;
            background-color: #ff6b6b;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 2;
        }

        .flap {
            position: absolute;
            top: 0; width: 0; height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 110px solid #ee5253;
            transform-origin: top;
            transition: transform 0.4s ease;
            z-index: 5;
        }

        .letter {
            position: absolute;
            top: 10px; left: 10px;
            width: 280px; height: 180px;
            background: white;
            padding: 20px;
            box-sizing: border-box;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
            text-align: center;
        }

        .envelope-container.open .flap { transform: rotateX(180deg); z-index: 0; }
        .envelope-container.open .letter {
            transform: translateY(-150px) scale(1.2);
            z-index: 10;
            height: 250px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        /* Balloons */
        .balloon {
            position: absolute;
            bottom: -100px;
            width: 40px; height: 55px;
            border-radius: 50%;
            z-index: 25;
            animation: floatUp 4s ease-in forwards;
        }

        @keyframes floatUp {
            to { transform: translateY(-120vh) translateX(40px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="memory top-left">
        <img src="https://picsum.photos/200/200?random=1" alt="Memory 1">
    </div>
    <div class="memory top-right">
        <img src="https://picsum.photos/200/200?random=2" alt="Memory 2">
    </div>
    <div class="memory bottom-left">
        <img src="https://picsum.photos/200/200?random=3" alt="Memory 3">
    </div>
    <div class="memory bottom-right">
        <img src="https://picsum.photos/200/200?random=4" alt="Memory 4">
    </div>

    <div class="envelope-container" onclick="this.classList.toggle('open'); createBalloons();">
        <div class="flap"></div>
        <div class="envelope"></div>
        <div class="letter">
            <h2 style="color: #ff4757; margin-top: 0;">Happy Birthday! 🎂</h2>
            <p style="font-size: 0.9rem; color: #444;">To the person who makes every moment special. Here's to more memories together!</p>
            <p><strong>- Your Name</strong></p>
        </div>
    </div>

    <script>
        function createBalloons() {
            for (let i = 0; i < 20; i++) {
                const b = document.createElement('div');
                b.className = 'balloon';
                const colors = ['#ff4757', '#74b9ff', '#55efc4', '#fab1a0', '#a29bfe'];
                b.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                b.style.left = Math.random() * 100 + "vw";
                b.style.animationDelay = Math.random() * 2 + "s";
                document.body.appendChild(b);
                setTimeout(() => b.remove(), 5000);
            }
        }
    </script>
</body>
</html>
